<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Hacker Safari | Cryptos</title>
    <style>
        :root { --neon: #00ff41; --bg: #0a0a0a; --panel: #141414; --glow: 0 0 15px rgba(0, 255, 65, 0.3); }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* Login Overlay */
        #login-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .login-box { background: var(--panel); padding: 30px; border-radius: 12px; border: 1px solid var(--neon); box-shadow: var(--glow); width: 320px; text-align: center; }
        
        /* Main Container */
        .container { background: var(--panel); padding: 2rem; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.8), var(--glow); border: 1px solid #333; width: 420px; display: none; }

        h1 { text-align: center; font-size: 1.4rem; letter-spacing: 3px; margin-bottom: 5px; }
        .sub { text-align: center; font-size: 0.75rem; margin-bottom: 25px; color: #888; }
        label { font-size: 0.8rem; text-transform: uppercase; margin-top: 10px; display: block; }
        input, textarea { width: 100%; background: #000; border: 1px solid #444; color: var(--neon); padding: 12px; margin: 8px 0; border-radius: 4px; box-sizing: border-box; outline: none; }
        input:focus, textarea:focus { border-color: var(--neon); }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { padding: 12px; background: transparent; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }
        .btn-reset { border-color: #ff4444; color: #ff4444; }
        .btn-reset:hover { background: #ff4444; color: #000; box-shadow: 0 0 15px #ff4444; }
        .btn-copy { grid-column: span 2; border-style: dashed; margin-top: 5px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2>TERMINAL LOGIN</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="checkLogin()" style="width: 100%; margin-top: 10px;">Access System</button>
    </div>
</div>

<div class="container" id="main-app">
    <h1>CYBER ENVOY</h1>
    <div class="sub">Operator: Dark Hacker Safari</div>

    <label>Secret Access Key</label>
    <input type="password" id="key" placeholder="Encryption Key...">

    <label>Message Input</label>
    <textarea id="msg" rows="4" placeholder="Input text here..."></textarea>

    <div class="btn-grid">
        <button onclick="process(true)">Encrypt</button>
        <button onclick="process(false)">Decrypt</button>
        <button onclick="resetFields()" class="btn-reset">Reset</button>
        <button onclick="copyResult()" class="btn-copy">Copy Result</button>
    </div>

    <label>Output Result</label>
    <textarea id="res" rows="4" placeholder="Result..." readonly></textarea>
</div>

<script>
    function checkLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === 'safari' && p === 'safari410@') {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        } else {
            alert("ACCESS DENIED: Unauthorized Operator.");
        }
    }

    function xorLogic(input, key) {
        let output = "";
        for (let i = 0; i < input.length; i++) {
            output += String.fromCharCode(input.charCodeAt(i) ^ key.charCodeAt(i % key.length));
        }
        return output;
    }

    function process(isEncrypt) {
        const k = document.getElementById('key').value;
        let m = document.getElementById('msg').value;
        if (!k || !m) return alert("Key and Message required.");
        try {
            if (isEncrypt) {
                document.getElementById('res').value = btoa(xorLogic(m, k));
            } else {
                document.getElementById('res').value = xorLogic(atob(m), k);
            }
        } catch (e) { alert("Error: Invalid format or key."); }
    }

    function resetFields() {
        ['key','msg','res'].forEach(id => document.getElementById(id).value = '');
    }

    function copyResult() {
        navigator.clipboard.writeText(document.getElementById('res').value);
        alert("Copied!");
    }
</script>
</body>
</html>
