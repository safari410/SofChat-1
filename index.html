<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Telegram | D.H.S. Secure</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0e1621; --sidebar: #17212b; --active: #2b5278; --text: #ffffff; --neon: #00ff41; --tg-blue: #2481cc; }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: #070d14; color: var(--text); margin: 0; height: 100vh; display: flex; overflow: hidden; }

        /* Login Page - Clean & Fixed */
        #login-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-card { text-align: center; width: 400px;border-radius: 20px; padding : 50px; background-color: #373a3d; box-shadow: 3px 3px 6px rgb(88, 92, 141); }
        .login-card i { font-size: 4rem; color: var(--tg-blue); margin-bottom: 20px; }
        .login-card input { box-shadow: 2px 2px 3px #546a86; width: 100%; padding: 12px; margin: 10px 0; background: #242f3d; border: 1px solid #333485; color: rgb(183, 204, 192); border-radius: 15px; outline: none; }
        .login-card button { width: 100%; padding: 12px; background: var(--tg-blue); box-shadow: 3px 3px 6px var(--tg-blue); color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 15px; }
        
        .app-container { display: none; width: 100%; height: 100vh; grid-template-columns: 300px 1fr; }

        /* Sidebar Style */
        .sidebar { background: var(--sidebar); border-right: 1px solid #000; display: flex; flex-direction: column; }
        .search-bar { padding: 15px; }
        .search-bar input { width: 100%; padding: 8px 12px; background: #242f3d; border: none; color: white; border-radius: 20px; outline: none; }
        
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 12px 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; }
        .chat-item:hover { background: #232e3a; }
        .chat-item.active { background: var(--active); }
        .pfp { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background: #555; }

        /* Main Chat Style */
        .main-content { display: flex; flex-direction: column; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: cover; position: relative; }
        .top-nav { height: 56px; background: var(--sidebar); display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #000; justify-content: space-between; }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 4px; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 70%; font-size: 0.95rem; position: relative; }
        .sent { align-self: flex-end; background: #2b5278; border-bottom-right-radius: 2px; }
        .rcvd { align-self: flex-start; background: #182533; border-bottom-left-radius: 2px; }
        .msg img { max-width: 100%; border-radius: 8px; margin-top: 5px; }

        /* Telegram Input Bar */
        .input-bar { padding: 10px 20px; background: var(--sidebar); display: flex; align-items: center; gap: 15px; }
        .input-bar i { color: #7f91a4; font-size: 1.3rem; cursor: pointer; transition: 0.2s; }
        .input-bar i:hover { color: var(--tg-blue); }
        .msg-input { flex: 1; background: transparent; border: none; color: white; outline: none; padding: 10px; font-size: 1rem; }

        /* PIN LOCK Overlay */
        #pin-lock { position: absolute; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <i class="fa-brands fa-telegram"></i>
        <h2 style="color: blue; border-radius: 5px;">Log in to SofChat</h2>
        <p style="color: #33855f;">By Safari</p>
        <input type="text" id="login-user" placeholder="Username">
        <input type="password" id="login-pass" placeholder="Password">
        <button onclick="auth()">NEXT</button><br><br>
         
    </div>
</div>

<div class="app-container" id="app">
    <aside class="sidebar">
        <div class="search-bar">
            <input type="text" placeholder="Search">
        </div>
        <div class="chat-list">
            <div class="chat-item active" onclick="switchChat('global')">
                <div class="pfp" style="display:flex; align-items:center; justify-content:center; background:#2481cc; font-weight:bold;">G</div>
                <div><b>Global Chat</b><br><small style="color:#7f91a4">Public transmission...</small></div>
            </div>
            <div id="users-container"></div>
        </div>
        <div style="padding:15px; border-top:1px solid #000;">
            <input type="file" id="pfp-upload" hidden onchange="updatePFP(this)">
            <button onclick="document.getElementById('pfp-upload').click()" style="background:none; border:none; color:var(--tg-blue); cursor:pointer; font-size:0.8rem;">EDIT PROFILE PIC</button>
        </div>
    </aside>

    <main class="main-content">
        <div id="pin-lock">
            <i class="fa-solid fa-lock" style="font-size:3rem; color:var(--tg-blue); margin-bottom:20px;"></i>
            <h3>Enter 6-digit Secret Key</h3>
            <input type="password" id="pin-input" maxlength="6" style="background:#242f3d; border:1px solid #333; color:white; padding:10px; text-align:center; width:150px; border-radius:8px;">
            <button onclick="unlock()" style="margin-top:15px; background:var(--tg-blue); border:none; color:white; padding:8px 25px; border-radius:8px; cursor:pointer;">UNLOCK</button>
        </div>

        <div class="top-nav">
            <b id="active-title">Global Chat</b>
            <i class="fa-solid fa-ellipsis-vertical" style="cursor:pointer;"></i>
        </div>

        <div id="chat-window"></div>

        <div class="input-bar">
            <i class="fa-regular fa-face-smile"></i>
            <i class="fa-solid fa-paperclip" onclick="document.getElementById('file-up').click()"></i>
            <input type="file" id="file-up" hidden onchange="sendFile(this)">
            <input type="text" id="main-input" class="msg-input" placeholder="Message" onkeypress="if(event.key==='Enter') transmit()">
            <i class="fa-solid fa-microphone" id="mic-btn" onclick="record()"></i>
            <i class="fa-solid fa-paper-plane" onclick="transmit()" style="color:var(--tg-blue)"></i>
        </div>
    </main>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDD5GnHq76_XBOkkFiqeffJIRDZHwloUMQ",
        authDomain: "safari-chatroom.firebaseapp.com",
        projectId: "safari-chatroom",
        storageBucket: "safari-chatroom.firebasestorage.app",
        databaseURL: "https://safari-chatroom-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let myId = "", chatPath = "global", mediaRec, chunks = [];

    function auth() {
        const u = document.getElementById('login-user').value;
        const p = document.getElementById('login-pass').value;
        if(u && p === "safari410@") {
            myId = u;
            db.ref('users/'+u).update({ name: u });
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app').style.display = 'grid';
            loadApp();
        }
    }

    function loadApp() {
        db.ref('users').on('value', snap => {
            const cont = document.getElementById('users-container'); cont.innerHTML = '';
            snap.forEach(u => {
                if(u.key === myId) return;
                const d = u.val();
                cont.innerHTML += `
                <div class="chat-item" onclick="switchChat('private', '${u.key}')">
                    <img src="${d.pfp || 'https://api.dicebear.com/7.x/identicon/svg?seed='+u.key}" class="pfp">
                    <div><b>${u.key}</b><br><small style="color:#7f91a4">Private encrypted</small></div>
                </div>`;
            });
        });
        sync();
    }

    function switchChat(type, otherId) {
        chatPath = (type === 'global') ? 'global' : (myId < otherId ? `${myId}_${otherId}` : `${otherId}_${myId}`);
        document.getElementById('active-title').innerText = type === 'global' ? 'Global Chat' : otherId;
        document.getElementById('pin-lock').style.display = (type === 'private') ? 'flex' : 'none';
        sync();
    }

    function unlock() { if(document.getElementById('pin-input').value.length === 6) document.getElementById('pin-lock').style.display = 'none'; }

    function sync() {
        db.ref('chats/'+chatPath).off();
        db.ref('chats/'+chatPath).on('value', snap => {
            const box = document.getElementById('chat-window'); box.innerHTML = '';
            snap.forEach(m => {
                const d = m.val();
                const isMe = d.sender === myId;
                let body = d.type === 'img' ? `<img src="${d.text}">` : d.type === 'audio' ? `<audio controls src="${d.text}"></audio>` : d.text;
                box.innerHTML += `<div class="msg ${isMe?'sent':'rcvd'}">${body}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function transmit() {
        const i = document.getElementById('main-input');
        if(i.value) { db.ref('chats/'+chatPath).push({ sender: myId, text: i.value, type: 'text' }); i.value = ''; }
    }

    function sendFile(input) {
        const reader = new FileReader();
        reader.onload = e => db.ref('chats/'+chatPath).push({ sender: myId, text: e.target.result, type: 'img' });
        reader.readAsDataURL(input.files[0]);
    }

    function updatePFP(input) {
        const reader = new FileReader();
        reader.onload = e => db.ref('users/'+myId).update({ pfp: e.target.result });
        reader.readAsDataURL(input.files[0]);
    }

    async function record() {
        const btn = document.getElementById('mic-btn');
        if (!mediaRec || mediaRec.state === "inactive") {
            const s = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRec = new MediaRecorder(s);
            mediaRec.ondataavailable = e => chunks.push(e.data);
            mediaRec.onstop = () => {
                const r = new FileReader();
                r.onload = e => db.ref('chats/'+chatPath).push({ sender: myId, text: e.target.result, type: 'audio' });
                r.readAsDataURL(new Blob(chunks, { type: 'audio/webm' })); chunks = [];
            };
            mediaRec.start(); btn.style.color = "red";
        } else { mediaRec.stop(); btn.style.color = "#7f91a4"; }
    }
</script>
</body>
</html>
